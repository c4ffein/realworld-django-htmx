name: Test E2E

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2
    - name: Install Python dependencies
      run: make sync
    - name: Install Playwright dependencies
      run: bun install && bun playwright install chromium --with-deps
    - name: Run E2E tests
      run: make e2e
    - name: Upload test results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright/playwright-report/
        retention-days: 7
