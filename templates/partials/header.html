{% load static %}
<nav class="navbar navbar-light">
  <div class="container">
    <a class="navbar-brand" href="/"><img src="{% static 'images/conduit-logo.svg' %}" alt="conduit" style="height:1.5rem"></a>
    <ul class="nav navbar-nav">
      <li class="nav-item">
        <a class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}" href="/">Home</a>
      </li>
      {% if user.is_authenticated %}
      <li class="nav-item">
        <a class="nav-link{% if request.resolver_match.url_name == 'article_create' %} active{% endif %}" href="{% url 'article_create' %}">
          <i class="ion-compose"></i>&nbsp;New Article
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link{% if request.resolver_match.url_name == 'settings' %} active{% endif %}" href="{% url 'settings' %}">
          <i class="ion-gear-a"></i>&nbsp;Settings
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link{% if request.resolver_match.url_name == 'profile' and request.resolver_match.kwargs.username == user.username %} active{% endif %}" href="{% url 'profile' username=user.username %}">
          <img class="user-pic" src="{% if user.image %}{{ user.image }}{% else %}{% static 'images/default-avatar.svg' %}{% endif %}" alt="{{ user.username }}">
          {{ user.username }}
        </a>
      </li>
      {% else %}
      <li class="nav-item">
        <a class="nav-link{% if request.resolver_match.url_name == 'login' %} active{% endif %}" href="{% url 'login' %}">Sign in</a>
      </li>
      <li class="nav-item">
        <a class="nav-link nav-signup{% if request.resolver_match.url_name == 'register' %} active{% endif %}" href="{% url 'register' %}">Sign up</a>
      </li>
      {% endif %}
    </ul>
  </div>
</nav>
